<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Les Of Us</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        text-align: center;

        /* Background Image */
        background: url("main.png") no-repeat center center fixed;
        background-size: cover;
    }

    /* Dark overlay for readability */
    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 0;
    }

    .menu {
        position: relative;
        z-index: 1;
        animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
        font-size: 56px;
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    h2 {
        font-weight: normal;
        color: #d0d0ff;
        margin-bottom: 40px;
    }

    .play-btn {
        font-size: 22px;
        padding: 12px 40px;
        border: none;
        border-radius: 8px;
        background-color: #6c63ff;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .play-btn:hover {
        background-color: #8a84ff;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>
    <div class="menu">
        <h1>The Les Of Us</h1>
        <h2>Visual Novel</h2>
        <button class="play-btn" onclick="startGame()">Play</button>
    </div>

<script>
    function startGame() {
        window.location.href = "intro.html";
    }
</script>
</body>
</html>
