<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Les Of Us — Scene 1</title>

<style>

    @keyframes walkLeft {
        from { left: -25%; }
        to   { left: 12%; }
    }

    @keyframes walkRight {
        from { right: -25%; }
        to   { right: 12%; }
    }

    .walk-left {
        animation: walkLeft 2s forwards;
    }

    .walk-right {
        animation: walkRight 2s forwards;
    }

    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
    }

    /* Background */
    .background {
        position: fixed;
        inset: 0;
        background: url("bg.png") no-repeat center center;
        background-size: cover;
        z-index: -2;
    }

    /* Characters */
    .character {
        position: fixed;
        bottom: 0;
        height: 85vh;
        pointer-events: none;
        transition: 0.4s;
    }

    /* moved closer */
    .left { left: 12%; }
    .right { right: 12%; }

    /* Dialogue box */
    .dialogue-box {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.75);
        padding: 25px 40px 35px 40px;
        box-sizing: border-box;
    }

    .name {
        font-weight: bold;
        font-size: 20px;
        margin-bottom: 10px;
        color: #ffd86b;
    }

    .text {
        font-size: 22px;
        line-height: 1.5;
        margin-bottom: 20px;
        min-height: 60px;
    }

    .next-btn {
        position: absolute;
        right: 40px;
        bottom: 20px;
        font-size: 16px;
        padding: 8px 18px;
        background: white;
        border: 1px solid white;
        border-radius: 6px;
        cursor: pointer;
    }

    .next-btn:hover {
        background: black;
        color: white;
    }

    #choices {
        display: flex;
        justify-content: center;
        gap: 20px; /* space between buttons */
        margin-top: 20px;
    }

    .choice-btn {
        font-size: 16px;
        padding: 10px 20px;
        background: #ffd86b;
        border: 1px solid white;
        border-radius: 6px;
        cursor: pointer;
    }

    .choice-btn:hover {
        background: #ddd;
    }

    .shoot:hover {
        background: black;
        color: white;
    }

    .trust:hover {
        background: black;
        color: white;
    }

    #jumpscare {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        z-index: 999;
    }

    @keyframes floatUp {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-120vh);
            opacity: 0;
        }
    }

    .diana-dead {
        animation: floatUp 3s forwards;
    }
</style>
</head>

<body>

<div class="background"></div>
<img src="jumpscare.gif" id="jumpscare">
<audio id="jumpsound" src="jumpscare.mp3" preload="auto"></audio>

<img src="Ellisha_normal.png" class="character left" id="ellisha">
<img src="Diana_normal.png" class="character right" id="diana">

<div class="dialogue-box">
    <div class="name" id="charName">Ellisha (You)</div>
    <div class="text" id="dialogueText">
        Phew, another day of surviving those ugly mfs.
    </div>
    <button class="next-btn" onclick="nextLine()">Next ▶</button>

    <div id="choices" style="display:none; margin-top:15px; text-align:center;">
        <button onclick="choose('shoot')" class="choice-btn shoot">
            Shoot her(wtf??)
        </button>
        <button onclick="choose('trust')" class="choice-btn trust">
            Trust her
        </button>
    </div>
</div>

<script>
const script = [
    {
        name: "Ellisha (You)",
        text: "Phew, another day of surviving those ugly mfs."
    },
    {
        name: "Diana",
        text: "You were amazing as always."
    },
    {
        name: "Ellisha (You)",
        text: "Thanks sayang pookie wookie bbg loml who I'd sacrifice everything for!! :3"
    },
    {
        name: "Narrator",
        text: "You noticed bleeding from Diana's arm... Your heart dropped and your face turned pale."
    },
    {
        name: "Ellisha (You)",
        text: "Diana, your arm- YOU GOT BITTEN AND YOU DIDN'T TELL ME!?"
    },
    {
        name: "Diana",
        text: "Oh nuh uh ts just a scratch from a tree while we were running."
    },
    {
        name: "Ellisha (You)",
        text: "OH HELL NAW DAWG YOU AINT FOOLING ME!"
    },
    {
        name: "Diana",
        text: "SHIBAL EVEN IF I WAS BITTEN, AINT YOU LITERALLY IMMUNE!?"
    },
    {
        name: "Ellisha (You)",
        text: "OH HELL NAW DAWG I AINT TRYNA SEE MY GIRLFRIEND TURN INTO SOME FUCKASS UGLYASS CREATURE."
    },
    {
        name: "Diana",
        text: "Ellisha, why are you pointing a gun at me..?"
    }

];

const shootScript = [
    
    { name: "Ellisha (You)", text: "What have I done...?" }
];

const trustScript = [
    { name: "Diana", text: "I knew you wouldn't do it.. I love you, Ellisha." },
    { name: "Ellisha (You)", text: "I love you too.." },
    { name: "Diana", text: "Besides, you would've missed our opportunity to raise a family." },
    { name: "Ellisha (You)", text: "Wait what?" },
    { name: "Narrator", text: "Diana softly smiles... her gaze went to her stomach and then back to you." },
    { name: "Diana", text: "I'm pregnant, baby..." },
];

let index = 0;
let currentScript = script;
let endingTriggered = false;
let endingReadyToExit = false;

function nextLine() {

    if (endingReadyToExit) {
        window.location.href = "game2.html";
        return;
    }

    if (currentScript === shootScript && index === currentScript.length - 1) {
        window.location.href = "game2.html";
        return;
    }

    if (currentScript === trustScript && index === currentScript.length - 1 && !endingTriggered) {
        endingTriggered = true;

        const scare = document.getElementById("jumpscare");
        const sound = document.getElementById("jumpsound");

        sound.pause();
        sound.currentTime = 0;

        const playPromise = sound.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                console.log("Audio blocked");
            });
        }

        scare.style.display = "block";

        document.getElementById("ellisha").src = "Ellisha_gun.png";
        document.getElementById("diana").style.opacity = "0.5";

        setTimeout(() => {
            scare.style.display = "none";
            document.getElementById("diana").classList.add("diana-dead");

            document.getElementById("charName").innerText = "Narrator";
            document.getElementById("dialogueText").innerText = "You shot her.";
            endingReadyToExit = true;

        }, 2000);

        return;
    }

    index++;

    if (index < currentScript.length) {
        document.getElementById("charName").innerText = currentScript[index].name;
        document.getElementById("dialogueText").innerText = currentScript[index].text;
    }

    if (index === 8) {
        document.getElementById("ellisha").src = "Ellisha_gun.png";
    }

    if (index === 9) {
        document.getElementById("choices").style.display = "block";
        document.querySelector(".next-btn").style.display = "none";
    }
}
</script>

<script>
window.onload = function() {
    document.getElementById("ellisha").classList.add("walk-left");
    document.getElementById("diana").classList.add("walk-right");
};

window.addEventListener("load", () => {
    const sound = document.getElementById("jumpsound");
    sound.load(); // helps reduce delay
});

function choose(option) {
    const name = document.getElementById("charName");
    const text = document.getElementById("dialogueText");

    document.getElementById("choices").style.display = "none";

    if (option === "shoot") {
        name.innerText = "Narrator";
        text.innerText = "Your hands tremble... but you pull the trigger. Literally wtf is wrong with you what the hell??";

        document.getElementById("diana").style.opacity = "0.5";
        

        // JUMPSCARE
        const scare = document.getElementById("jumpscare");
        const sound = document.getElementById("jumpsound");

        scare.style.display = "block";
        sound.play();

        setTimeout(() => {
            scare.style.display = "none";
            document.getElementById("diana").classList.add("diana-dead");
        }, 2000);

        currentScript = shootScript;
        index = -1;
    }

    if (option === "trust") {
        name.innerText = "Ellisha (You)";
        text.innerText = "…Fine, I trust you. I'm sorry bookie wookie boo boo bear :(";

        // optional: lower tension
        document.getElementById("ellisha").src = "Ellisha_normal.png";
        currentScript = trustScript;
        index = -1;
    }

    document.querySelector(".next-btn").style.display = "block";
    
}
</script>

</body>
</html>
